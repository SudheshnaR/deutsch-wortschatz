<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Deutsch Wortschatz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117; --bg2:#171a23; --card:#1e222e; --card2:#272c3a;
  --txt:#eef0f6; --dim:#8a90a6; --line:#2e3342;
  --noun:#5ad1a8; --verb:#9d8dff; --adj:#ffce5c; --other:#ff7ea8;
  --der:#9d8dff; --die:#ff7ea8; --das:#5ad1a8;
  --accent:#5ad1a8; --accent-d:#3bb389; --warn:#ffce5c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;position:fixed;width:100%;display:flex;flex-direction:column}
.serif{font-family:'Fraunces',serif}
#app{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(86px + env(safe-area-inset-bottom));padding-top:env(safe-area-inset-top)}
.screen{display:none;padding:18px 16px 8px;animation:fade .3s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
h1.title{font-family:'Fraunces',serif;font-size:27px;font-weight:700;letter-spacing:-.5px}
.sub{color:var(--dim);font-size:13px;margin-top:2px}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;gap:10px}

nav{position:fixed;bottom:0;left:0;right:0;height:calc(74px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(23,26,35,.94);backdrop-filter:blur(20px);border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding-left:4px;padding-right:4px;z-index:50}
nav button{background:none;border:none;color:var(--dim);font-family:inherit;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;flex:1;cursor:pointer;transition:color .2s}
nav button .ic{font-size:21px;line-height:1}
nav button.active{color:var(--accent)}

.btn{background:var(--accent);color:#0f1117;border:none;border-radius:14px;padding:14px 20px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4}
.btn.ghost{background:var(--card);color:var(--txt);border:1px solid var(--line)}
.btn.sm{padding:9px 14px;font-size:13px;border-radius:11px}
.btn.full{width:100%}
.btn.warn{background:var(--warn);color:#0f1117}

.pill{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pill.noun{background:rgba(90,209,168,.16);color:var(--noun)}
.pill.verb{background:rgba(157,141,255,.16);color:var(--verb)}
.pill.adj{background:rgba(255,206,92,.16);color:var(--adj)}
.pill.other{background:rgba(255,126,168,.16);color:var(--other)}
.art-tag{font-weight:700}.art-der{color:var(--der)}.art-die{color:var(--die)}.art-das{color:var(--das)}

.card-box{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 10px;text-align:center}
.stat .n{font-family:'Fraunces',serif;font-size:26px;font-weight:700}
.stat .l{font-size:11px;color:var(--dim);margin-top:2px;font-weight:600}
.stat.due .n{color:var(--warn)} .stat.learned .n{color:var(--noun)} .stat.streak .n{color:var(--verb)}

.hero{background:linear-gradient(140deg,#272c3a,#1e222e);border:1px solid var(--line);border-radius:22px;padding:20px;margin-bottom:16px}
.hero-date{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.hero-sim{font-size:11px;color:var(--warn);font-weight:700;margin-top:3px}

.banner{display:flex;align-items:center;gap:9px;background:rgba(255,206,92,.1);border:1px solid rgba(255,206,92,.3);border-radius:13px;padding:11px 14px;font-size:13px;color:var(--warn);margin-bottom:14px;font-weight:600}
.banner.acc{background:rgba(90,209,168,.1);border-color:rgba(90,209,168,.3);color:var(--accent)}

/* study card */
.fc-wrap{perspective:1200px;margin:6px 0 16px}
.fc{position:relative;width:100%;height:330px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1);cursor:pointer}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:24px;padding:24px;display:flex;flex-direction:column;border:1px solid var(--line)}
.fc-front{background:linear-gradient(150deg,var(--card2),var(--card))}
.fc-back{background:linear-gradient(150deg,#2b3344,#222838);transform:rotateY(180deg)}
.fc-top{display:flex;justify-content:space-between;align-items:center}
.fc-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:9px}
.fc-art{font-size:18px;font-weight:700}
.fc-word{font-family:'Fraunces',serif;font-size:36px;font-weight:700;line-height:1.1}
.fc-pl{font-size:13px;color:var(--dim)}
.fc-en{font-family:'Fraunces',serif;font-size:28px;font-weight:600;line-height:1.15}
.fc-ex{font-size:15px;color:var(--dim);font-style:italic;line-height:1.5;border-top:1px solid var(--line);padding-top:13px;margin-top:2px}
.fc-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;background:rgba(157,141,255,.16);color:var(--verb)}
.lvl-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;background:rgba(255,206,92,.15);color:var(--warn);letter-spacing:.3px;vertical-align:middle;margin-left:5px}
.speak-btn{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:rgba(90,209,168,.14);border:1.5px solid rgba(90,209,168,.4);color:var(--accent);font-size:20px;cursor:pointer;transition:transform .12s;flex-shrink:0}
.speak-btn:active{transform:scale(.9)}
.speak-sm{width:34px;height:34px;font-size:16px}
.fc-back .speak-btn{width:auto;height:auto;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:700;gap:6px;margin-top:4px}
.icon-gear{background:var(--card);border:1px solid var(--line);color:var(--txt);width:42px;height:42px;border-radius:13px;font-size:19px;cursor:pointer;flex-shrink:0}
.icon-gear:active{transform:scale(.94)}
.review-group{margin-bottom:14px}
.review-group-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:700;font-size:14px}
.review-count{font-size:12px;color:var(--dim);font-weight:600}
.toggle{width:50px;height:30px;border-radius:16px;background:var(--line);position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on .knob{left:23px}
.rate-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.rate-btn{padding:15px;border-radius:15px;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s}
.rate-btn:active{transform:scale(.97)}
.rate-got{background:var(--accent);color:#0f1117}
.rate-again{background:var(--card);color:var(--warn);border:1.5px solid var(--warn)}
.study-prog{text-align:center;font-size:13px;color:var(--dim);font-weight:600;margin-bottom:10px}
.study-done{text-align:center;padding:30px 0}
.study-done .big{font-size:54px}

/* history */
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px}
.cal-dow{text-align:center;font-size:11px;color:var(--dim);font-weight:700;padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:11px;background:var(--card);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:600;position:relative;transition:.15s}
.cal-day.empty{background:transparent;border:none;cursor:default}
.cal-day.has{border-color:var(--accent)}
.cal-day.today{background:var(--accent);color:#0f1117}
.cal-day .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);position:absolute;bottom:6px}
.cal-day.today .dot{background:#0f1117}
.cal-day.sel{outline:2px solid var(--verb)}
.day-detail{margin-top:8px}
.wl-item{padding:13px 14px;background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px}
.wl-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.wl-de{font-family:'Fraunces',serif;font-size:17px;font-weight:600}
.wl-en{color:var(--dim);font-size:14px;margin-top:3px}
.wl-ex{color:var(--dim);font-size:13px;font-style:italic;margin-top:6px;line-height:1.4}
.tagrow{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:7px;text-transform:uppercase;letter-spacing:.4px}
.tag.new{background:rgba(90,209,168,.16);color:var(--noun)}
.tag.rev{background:rgba(157,141,255,.16);color:var(--verb)}
.tag.got{background:rgba(90,209,168,.16);color:var(--noun)}
.tag.again{background:rgba(255,206,92,.16);color:var(--warn)}
.tag.due{background:rgba(255,126,168,.16);color:var(--other)}

.search-box{width:100%;padding:13px 16px;border-radius:14px;background:var(--card);border:1px solid var(--line);color:var(--txt);font-family:inherit;font-size:15px;margin-bottom:12px}
.search-box::placeholder{color:var(--dim)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:7px 14px;border-radius:20px;background:var(--card);border:1px solid var(--line);color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;flex-shrink:0}
.chip.active{background:var(--accent);color:#0f1117;border-color:var(--accent)}
.count-badge{font-size:12px;color:var(--dim);font-weight:600;margin-bottom:10px}
.progress-chip{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700}
.pc-learned{background:rgba(90,209,168,.16);color:var(--noun)}
.pc-review{background:rgba(157,141,255,.16);color:var(--verb)}

/* settings / modal */
.opt-row{display:flex;align-items:flex-start;gap:12px;padding:15px;border-radius:14px;background:var(--card);border:1.5px solid var(--line);cursor:pointer;margin-bottom:10px;transition:.15s}
.opt-row.sel{border-color:var(--accent);background:rgba(90,209,168,.08)}
.opt-radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.opt-row.sel .opt-radio{border-color:var(--accent)}
.opt-row.sel .opt-radio::after{content:'';width:11px;height:11px;border-radius:50%;background:var(--accent)}
.opt-title{font-weight:700;font-size:15px}
.opt-desc{font-size:13px;color:var(--dim);margin-top:3px;line-height:1.4}
.set-label{font-size:12px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:18px 0 10px}

.overlay{position:fixed;inset:0;background:rgba(8,9,13,.82);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:24px;padding:26px 22px;max-width:420px;width:100%;max-height:86vh;overflow-y:auto;animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.modal h2{font-family:'Fraunces',serif;font-size:24px;margin-bottom:6px}
.modal .lead{color:var(--dim);font-size:14px;margin-bottom:18px;line-height:1.5}

.empty{text-align:center;color:var(--dim);padding:40px 20px;font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0f1117;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:700;opacity:0;transition:.3s;z-index:200;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sim-bar{display:flex;align-items:center;gap:8px;background:rgba(255,206,92,.08);border:1px dashed rgba(255,206,92,.4);border-radius:12px;padding:9px 12px;margin-bottom:14px;font-size:12px;font-weight:600;color:var(--warn)}
.sim-bar button{background:rgba(255,206,92,.2);color:var(--warn);border:none;border-radius:8px;padding:5px 10px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--dim);font-size:15px}

/* ===== GAMES ===== */
.game-menu{display:grid;gap:12px}
.game-tile{display:flex;align-items:center;gap:14px;padding:18px;border-radius:18px;background:var(--card);border:1px solid var(--line);cursor:pointer;transition:transform .12s,border-color .2s}
.game-tile:active{transform:scale(.98)}
.game-tile .gi{font-size:30px;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.game-tile .gt{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.game-tile .gd{font-size:13px;color:var(--dim);margin-top:2px}
.gi.q{background:rgba(157,141,255,.16)} .gi.s{background:rgba(90,209,168,.16)} .gi.m{background:rgba(255,126,168,.16)}
.game-back{display:inline-flex;align-items:center;gap:6px;color:var(--dim);font-weight:600;font-size:14px;cursor:pointer;margin-bottom:14px;background:none;border:none;font-family:inherit}

.quiz-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;margin-bottom:16px}
.quiz-q{font-family:'Fraunces',serif;font-size:24px;font-weight:600;text-align:center;margin:10px 0 4px;line-height:1.2}
.quiz-qsub{text-align:center;color:var(--dim);font-size:13px;margin-bottom:6px}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.opt{padding:15px;border-radius:14px;background:var(--bg2);border:1.5px solid var(--line);font-size:16px;font-weight:500;cursor:pointer;text-align:left;transition:.15s;color:var(--txt);font-family:inherit}
.opt:active{transform:scale(.98)}
.opt.correct{background:rgba(90,209,168,.2);border-color:var(--noun);color:var(--noun)}
.opt.wrong{background:rgba(255,126,168,.18);border-color:var(--other);color:var(--other)}
.opt.dim{opacity:.45}
.quiz-stat{display:flex;justify-content:space-between;margin-bottom:14px;font-size:13px;font-weight:600;color:var(--dim)}
.quiz-score-big{text-align:center;padding:30px 0}
.quiz-score-big .num{font-family:'Fraunces',serif;font-size:60px;font-weight:700;color:var(--accent)}
.story-tile{display:flex;align-items:center;gap:14px;padding:16px;border-radius:18px;background:var(--card);border:1px solid var(--line);cursor:pointer;transition:transform .12s,border-color .2s;margin-bottom:12px}
.story-tile:active{transform:scale(.98)}
.story-tile .si{font-size:28px;width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(157,141,255,.16)}
.story-tile .st{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.story-tile .sd{font-size:13px;color:var(--dim);margin-top:2px}
.story-tile .smeta{font-size:11px;color:var(--dim);margin-top:4px}
.story-done{color:var(--accent);font-size:12px;font-weight:700}
.sent{padding:14px 16px;border-radius:14px;background:var(--card);border:1px solid var(--line);margin-bottom:10px;cursor:pointer;transition:.15s}
.sent:active{transform:scale(.99)}
.sent.playing{border-color:var(--accent);background:rgba(90,209,168,.08)}
.sent-de{font-size:17px;line-height:1.5;font-weight:500;display:flex;align-items:flex-start;gap:10px}
.sent-de .stxt{flex:1}
.sent-en{font-size:14px;color:var(--dim);line-height:1.45;margin-top:7px;display:none}
.sent.show-en .sent-en{display:block}
.sent-mini{width:34px;height:34px;border-radius:50%;background:rgba(90,209,168,.14);border:1.5px solid rgba(90,209,168,.4);color:var(--accent);font-size:15px;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
.sent-mini:active{transform:scale(.9)}
.story-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.story-toolbar .btn.sm{flex:1;min-width:0;white-space:nowrap}

.ws-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;font-weight:600}
.ws-grid{display:grid;gap:7px;margin:0 auto 16px;touch-action:none;user-select:none;width:100%;max-width:380px}
.ws-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--line);border-radius:10px;font-weight:700;font-size:19px;text-transform:uppercase;transition:.1s;min-height:36px}
.ws-cell.sel{background:var(--accent);color:#0f1117;transform:scale(1.08);border-color:var(--accent)}
.ws-cell.found{background:rgba(90,209,168,.25);color:var(--noun);border-color:var(--noun)}
.ws-words{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.ws-target{padding:8px 12px;border-radius:11px;background:var(--card);border:1px solid var(--line);font-size:13px;font-weight:600}
.ws-target .en{color:var(--dim);font-weight:400;font-size:11px}
.ws-target.done{text-decoration:line-through;opacity:.5;background:rgba(90,209,168,.12)}

.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.mem-card{aspect-ratio:.78;border-radius:13px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flipped,.mem-card.matched{transform:rotateY(180deg)}
.mem-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:13px;display:flex;align-items:center;justify-content:center;text-align:center;padding:6px;font-size:13px;font-weight:600}
.mem-back{background:linear-gradient(140deg,var(--accent),var(--accent-d));color:#0f1117;font-size:24px}
.mem-front{background:var(--card);border:1.5px solid var(--line);transform:rotateY(180deg);font-family:'Fraunces',serif;line-height:1.15}
.mem-card.matched .mem-front{border-color:var(--noun);background:rgba(90,209,168,.14);color:var(--noun)}
.mem-front.de{font-size:14px} .mem-front.en{font-size:13px;color:var(--dim);font-family:'DM Sans'}
.mem-card.matched .mem-front.en{color:var(--noun)}
.gi.p{background:rgba(255,206,92,.16)} .gi.b{background:rgba(157,141,255,.16)}
/* picture quiz */
.pic-emoji{font-size:92px;text-align:center;line-height:1.1;margin:6px 0 10px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.35))}
/* mnemonics / Eselsbrücken */
.es-card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 18px 16px;margin-bottom:14px}
.es-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:8px}
.es-sentence{font-family:'Fraunces',serif;font-size:18px;line-height:1.5;margin-bottom:8px;padding-right:40px}
.es-sentence-en{font-size:14px;line-height:1.45;color:var(--dim);margin-bottom:12px;padding-right:40px;font-style:italic}
.es-w-en{color:var(--accent);font-weight:600;font-style:normal}
.es-w{color:var(--accent);font-weight:600;cursor:pointer;border-bottom:1.5px dotted var(--accent)}
.es-words{display:flex;flex-wrap:wrap;gap:7px}
.es-chip{font-size:12px;font-weight:600;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:5px 9px}
.es-chip .es-en{color:var(--dim);font-weight:400}
.es-speak{position:absolute;top:14px;right:14px;width:38px;height:38px;font-size:17px}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading…</div></div>

/* =========================================================
   DATA LAYER — all persistence isolated here.
   For the native/App Store build (Capacitor), replace the
   body of load()/save() with Preferences/SQLite calls.
   Everything else in the app is storage-agnostic.
   ========================================================= */
const DB = (function(){
  const KEY='wortschatz_v1';
  let state=null;
  let saveTimer=null, saving=Promise.resolve();
  const LEVELS=['A1','A2','B1','B2','C1'];
  function freshLevel(){ return {progress:{}, days:{}}; }
  const fresh=()=>{
    const levels={}; LEVELS.forEach(L=>levels[L]=freshLevel());
    return {
      profile:null,                 // {name, pin} — set at login/first run
      currentLevel:null,            // chosen on first run
      settings:{ reviewMode:'mixed', dailyGoal:10, autoReview:true, hideLowerLevel:false },
      levels,                       // per-level {progress, days}
      storiesDone:{},               // {storyId: bestScorePct}
      simOffset:0,
      firstRun:true
    };
  };
  // expose current level's progress/days as top-level refs so the rest of the
  // app can keep using state.progress / state.days unchanged.
  function bind(){
    if(!state.levels) state.levels={};
    if(!state.currentLevel) state.currentLevel='A2';
    if(!state.levels[state.currentLevel]) state.levels[state.currentLevel]=freshLevel();
    const lvl=state.levels[state.currentLevel];
    lvl.progress=lvl.progress||{}; lvl.days=lvl.days||{};
    state.progress=lvl.progress;
    state.days=lvl.days;
  }
  // Native: Capacitor Preferences; browser dev: localStorage. Attempted on
  // read so data written by either survives. This is the ONLY place persistence
  // lives — swap these two helpers for native storage in the Capacitor build.
  function prefs(){ return (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Preferences) || null; }
  async function rawGet(){
    const P=prefs();
    if(P){ try{ const r=await P.get({key:KEY}); if(r && r.value!=null) return r.value; }catch(e){} }
    try{ return localStorage.getItem(KEY); }catch(e){ return null; }
  }
  async function rawSet(str){
    const P=prefs();
    if(P){ try{ await P.set({key:KEY, value:str}); }catch(e){} }
    try{ localStorage.setItem(KEY, str); }catch(e){}
    return true;
  }
  function migrate(o){
    // migrate old flat {progress,days} shape into levels.A2
    if(o && o.progress && !o.levels){
      const levels={}; LEVELS.forEach(L=>levels[L]=freshLevel());
      levels['A2']={progress:o.progress||{}, days:o.days||{}};
      return { profile:o.profile||null, currentLevel:o.currentLevel||'A2',
               settings:Object.assign({reviewMode:'mixed',dailyGoal:10,autoReview:true,hideLowerLevel:false}, o.settings||{}),
               levels, simOffset:o.simOffset||0, firstRun:o.firstRun!==false?false:false };
    }
    return o;
  }
  async function load(){
    const val=await rawGet();
    if(val){ try{ state=migrate(JSON.parse(val)); }catch(e){ state=fresh(); } }
    else state=fresh();
    if(!state || typeof state!=='object' || !state.settings){ state=fresh(); }
    if(!state.levels){ const lv={}; LEVELS.forEach(L=>lv[L]=freshLevel()); state.levels=lv; }
    if(state.settings.autoReview===undefined) state.settings.autoReview=true;
    if(state.settings.hideLowerLevel===undefined) state.settings.hideLowerLevel=false;
    if(!state.storiesDone || typeof state.storiesDone!=='object') state.storiesDone={};
    if(typeof state.simOffset!=='number') state.simOffset=0;
    bind();
    return state;
  }
  function save(){
    saving=saving.then(()=>rawSet(JSON.stringify(state))).catch(()=>{});
    return saving;
  }
  return {
    load, save, bind,
    LEVELS,
    flush:()=>saving,
    get:()=>state,
    setLevel:(L)=>{ state.currentLevel=L; if(!state.levels[L]) state.levels[L]=freshLevel(); bind(); save(); },
    serialize:()=>JSON.stringify(state),
    sizeBytes:()=>{ try{ return new Blob([JSON.stringify(state)]).size; }catch(e){ return JSON.stringify(state).length; } },
    importData:async(obj)=>{
      const o=migrate(obj);
      if(!o || typeof o!=='object' || !o.settings || !o.levels) throw new Error('bad');
      state=o; if(!state.currentLevel) state.currentLevel='A2'; bind(); await save();
    },
    reset:async()=>{ const p=state.profile; state=fresh(); state.profile=p; state.firstRun=false; state.currentLevel='A2'; bind(); await save(); }
  };
})();

const WORDLISTS = { A1:WORDS_A1, A2:WORDS, B1:(typeof WORDS_B1!=='undefined'?WORDS_B1:[]), B2:[], C1:[] };
function levelWords(L){ return WORDLISTS[L] && WORDLISTS[L].length ? WORDLISTS[L] : []; }
function activeWords(){
  const s=DB.get();
  const all=levelWords(s.currentLevel);
  if(!s.settings.hideLowerLevel) return all;
  // filter out words that belong to a lower level
  const order=['A1','A2','B1','B2','C1'];
  const curIdx=order.indexOf(s.currentLevel);
  return all.filter(w=>!w.level || order.indexOf(w.level)>=curIdx);
}
function levelHasWords(L){ return WORDLISTS[L] && WORDLISTS[L].length>0; }

function wid(w){ return w.type==='noun' ? ('N:'+w.art+':'+w.base) : (w.type+':'+w.w); }
// index every word across all lists so lookups work regardless of level
const WORD_BY_ID={};
Object.values(WORDLISTS).forEach(list=>list.forEach(w=>{ WORD_BY_ID[wid(w)]=w; }));
function germanOf(w){ return w.type==='noun' ? w.base : w.w; }
function fullGerman(w){ return w.type==='noun' ? (w.art+' '+w.base) : w.w; }

const MS_DAY=86400000;
function today(){ // returns Date at local midnight, plus sim offset
  const s=DB.get();
  const d=new Date(); d.setHours(0,0,0,0);
  d.setTime(d.getTime()+ (s.simOffset||0)*MS_DAY);
  return d;
}
function dayNum(d){ return Math.floor(d.getTime()/MS_DAY); }
function todayNum(){ return dayNum(today()); }
function dateKey(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function todayKey(){ return dateKey(today()); }
function fmtDate(d){ return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function fmtDateLong(d){ return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }

/* ===== SRS core ===== */
const INTERVALS=[5,10,20,40,80];  // box -> days until next review
function ensureProg(id){ const s=DB.get(); if(!s.progress[id]) s.progress[id]={box:0,due:null,graduated:false,lastSeen:null}; return s.progress[id]; }

function dueReviewIds(){
  const s=DB.get(), tn=todayNum();
  return Object.keys(s.progress).filter(id=>{
    const p=s.progress[id];
    return !p.graduated && p.due!==null && p.due<=tn;
  });
}
function isIntroduced(id){ const p=DB.get().progress[id]; return !!p; }

// all words with a review scheduled, sorted by due date; includes days-until
function scheduledReviews(){
  const s=DB.get(), tn=todayNum();
  return Object.keys(s.progress)
    .filter(id=>{ const p=s.progress[id]; return !p.graduated && p.due!==null; })
    .map(id=>({id, due:s.progress[id].due, daysUntil:s.progress[id].due-tn, box:s.progress[id].box}))
    .sort((a,b)=>a.due-b.due);
}

// rate a word during study: result = 'got' | 'again'
function rateWord(id, result){
  const s=DB.get(), p=ensureProg(id), tn=todayNum();
  if(result==='got'){
    p.box=Math.min(p.box+1, INTERVALS.length-1);
    p.due=tn+INTERVALS[p.box];
    // graduate after reaching last box
    if(p.box>=INTERVALS.length-1 && result==='got') p.graduated=false; // keep cycling; never hard-graduate so user can always review
  } else { // again — keep same/earlier box, due again after current box interval
    p.box=Math.max(0,p.box); // stay
    p.due=tn+INTERVALS[p.box];
  }
  p.lastSeen=tn;
  // record in today's day log
  const dk=todayKey();
  if(!s.days[dk]) s.days[dk]={new:[],reviewed:[],created:true};
  // if it was a review (already had lastSeen before today via due), log as reviewed
  s.days[dk].reviewed=s.days[dk].reviewed.filter(r=>r.id!==id);
  s.days[dk].reviewed.push({id,result});
  DB.save();
}

// introduce a new batch of N new words for today
function pullNewBatch(n){
  const s=DB.get(), dk=todayKey();
  if(!s.days[dk]) s.days[dk]={new:[],reviewed:[],created:true};
  const used=new Set(Object.keys(s.progress));
  const pool=activeWords().map(wid).filter(id=>!used.has(id));
  if(pool.length===0) return 0;
  const batch=shuffle(pool).slice(0,n);
  batch.forEach(id=>{ const p=ensureProg(id); p.box=0; p.due=null; p.lastSeen=todayNum(); s.days[dk].new.push(id); });
  DB.save();
  return batch.length;
}

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900); }

/* ===== AUDIO — German text-to-speech (native TTS on device, Web Speech API in browser) ===== */
let deVoice=null;
function pickVoice(){
  const vs=window.speechSynthesis ? speechSynthesis.getVoices() : [];
  deVoice = vs.find(v=>/de[-_]/i.test(v.lang)) || vs.find(v=>/^de/i.test(v.lang)) || null;
}
if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function nativeTTS(){
  return (window.Capacitor && Capacitor.isNativePlatform && Capacitor.isNativePlatform()
    && Capacitor.Plugins && Capacitor.Plugins.TextToSpeech) || null;
}
function speak(text,ev){
  if(ev){ ev.stopPropagation(); }
  const tts=nativeTTS();
  if(tts){
    tts.speak({text, lang:'de-DE', rate:.85, pitch:1.0, volume:1.0, category:'ambient'})
      .catch(()=>toast('🔇 Audio unavailable'));
    return;
  }
  if(!window.speechSynthesis){ toast('🔇 Audio not supported here'); return; }
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='de-DE'; u.rate=.85; if(deVoice) u.voice=deVoice;
    speechSynthesis.speak(u);
  }catch(e){ toast('🔇 Audio unavailable'); }
}
function speakWord(w,ev){ speak(germanOf(w),ev); }
function speakEx(id,ev){ const w=WORD_BY_ID[id]; if(w) speak(w.ex,ev); }

/* counts */
function totalLearned(){ return Object.values(DB.get().progress).filter(p=>p.lastSeen!==null).length; }
function streakCount(){
  const s=DB.get(); let n=0; let d=today();
  while(true){ const k=dateKey(d); const day=s.days[k]; if(day && (day.new.length||day.reviewed.length)){ n++; d=new Date(d.getTime()-MS_DAY);} else break; }
  return n;
}

/* =========================================================
   STUDY SESSION
   builds a queue from: due reviews + today's not-yet-rated new words,
   arranged per the user's reviewMode.
   ========================================================= */
let session=null;
function buildSession(reviewsOnly){
  const s=DB.get(), dk=todayKey(), tn=todayNum();
  const day=s.days[dk]||{new:[],reviewed:[]};
  const ratedToday=new Set(day.reviewed.map(r=>r.id));
  // new words introduced today not yet rated today
  const newQueue=day.new.filter(id=>!ratedToday.has(id)).map(id=>({id,kind:'new'}));
  // due reviews not yet done today
  let dueQueue=dueReviewIds().filter(id=>!ratedToday.has(id) && !day.new.includes(id)).map(id=>({id,kind:'review'}));
  // if auto-review is off, due reviews are NOT folded into the daily session
  // (they remain available in the Review tab). On by default.
  if(!reviewsOnly && s.settings.autoReview===false) dueQueue=[];
  const mode=s.settings.reviewMode;
  let queue;
  if(reviewsOnly){ queue=shuffle(dueQueue); }
  else if(mode==='separate'){ queue=[...dueQueue, ...newQueue]; } // reviews first, own flow
  else if(mode==='within'){ queue=shuffle([...dueQueue, ...newQueue]).slice(); } // mixed counted together
  else { queue=shuffle([...dueQueue, ...newQueue]); } // 'mixed' default
  session={queue, i:0, flipped:false, mode, dueCount:dueQueue.length, newCount:newQueue.length, reviewsOnly:!!reviewsOnly};
  return session;
}

function showScreen(id){
  if(typeof stopStoryAudio==='function' && id!=='stories') stopStoryAudio();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('screen-'+id);
  if(el) el.classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.s===id));
  document.getElementById('app').scrollTop=0;
  if(id==='home') renderHome();
  if(id==='study'){ buildSession(); renderStudy(); }
  if(id==='review') renderReview();
  if(id==='history') renderHistory();
  if(id==='games') renderGames();
  if(id==='stories') renderStories();
  if(id==='mnemonics') renderMnemonics();
  if(id==='browse') renderBrowse();
  if(id==='settings') renderSettings();
}

}

function addMoreWords(){
  const s=DB.get();
  if(!activeWords().length){ toast('📚 No words for '+s.currentLevel+' yet'); return; }
  const added=pullNewBatch(s.settings.dailyGoal||10);
  if(added===0){ toast('🎓 You\'ve started every '+s.currentLevel+' word!'); return; }
  toast(`➕ ${added} new words added`);
  buildSession(); showScreen('study');
}

function renderStudy(){
  const el=document.getElementById('screen-study');
  if(!session) buildSession();

/* ===== GAMES =====
   Games practise the words you're actively studying: today's new words +
   due reviews, topped up with other introduced/random words so they're
   always playable. Playing reinforces the same daily set. ===== */
function gamePool(min){
  min=min||8;
  const s=DB.get(), dk=todayKey();
  const day=s.days[dk]||{new:[],reviewed:[]};
  let ids=[...new Set([...day.new, ...dueReviewIds(), ...day.reviewed.map(r=>r.id)])];
  if(ids.length<min){
    const others=Object.keys(s.progress).filter(id=>!ids.includes(id))
      .sort((a,b)=>(s.progress[b].lastSeen||0)-(s.progress[a].lastSeen||0));
    ids=ids.concat(others.slice(0,min-ids.length));
  }
  if(ids.length<min){
    const pool=shuffle(activeWords().map(wid).filter(id=>!ids.includes(id)));
    ids=ids.concat(pool.slice(0,min-ids.length));
  }
  return ids.map(id=>WORD_BY_ID[id]).filter(Boolean);
}

function makeQ(w,qtype){
  if(qtype==='article') return {prompt:w.base, sub:'Which article?', options:shuffle(['der','die','das']).map(o=>({label:o,correct:o===w.art}))};
  if(qtype==='en2de'){ const d=qsample(activeWords(),3,w); return {prompt:w.en, sub:'Choose the German word', options:shuffle([w,...d]).map(x=>({label:germanOf(x),correct:x===w}))}; }

}
function qsample(arr,n,ex){ return shuffle(arr.filter(x=>x!==ex)).slice(0,n); }

/* ----- WORD SEARCH ----- */
let wsGrid=[], wsSize=0, wsTargets=[], wsFoundSet=new Set(), wsSel=[], wsDragging=false;
function newWordSearch(){
  wsFoundSet=new Set(); wsSel=[];
  // prefer shorter words (<=7) and fewer of them so the grid stays small with big cells
  const cand=gamePool(6).map(w=>({w,txt:germanOf(w).toUpperCase().replace(/[^A-ZÄÖÜß]/g,'')})).filter(o=>o.txt.length>=3&&o.txt.length<=7);
  wsTargets=shuffle(cand).slice(0,Math.min(5,cand.length));
  const maxLen=wsTargets.length?Math.max(...wsTargets.map(t=>t.txt.length)):6;
  // grid just big enough: max 8 columns so cells stay finger-sized
  wsSize=Math.min(8,Math.max(7,maxLen+1));
  buildWsGrid(); renderWs();
}
function buildWsGrid(){
  const N=wsSize; wsGrid=Array.from({length:N},()=>Array(N).fill(''));
  const dirs=[[0,1],[1,0],[1,1],[-1,1]];
  for(const t of wsTargets){
    let ok=false;
    for(let tr=0;tr<140&&!ok;tr++){
      const [dr,dc]=dirs[Math.floor(Math.random()*dirs.length)], len=t.txt.length;
      const r0=Math.floor(Math.random()*N), c0=Math.floor(Math.random()*N);
      const rE=r0+dr*(len-1), cE=c0+dc*(len-1);
      if(rE<0||rE>=N||cE<0||cE>=N) continue;
      let fits=true; const cells=[];
      for(let k=0;k<len;k++){ const r=r0+dr*k,c=c0+dc*k,cur=wsGrid[r][c]; if(cur&&cur!==t.txt[k]){fits=false;break;} cells.push([r,c]); }
      if(!fits) continue;
      cells.forEach(([r,c],k)=>wsGrid[r][c]=t.txt[k]); t.cells=cells.map(([r,c])=>r+'-'+c); ok=true;
    }
    if(!ok) t.cells=[];
  }
  const AB='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(!wsGrid[r][c]) wsGrid[r][c]=AB[Math.floor(Math.random()*26)];
}
function renderWs(){
  const el=document.getElementById('screen-games');
  el.innerHTML=`<div class="section-head"><div><h1 class="title">Word Search</h1></div></div>${gameBackBtn()}
    <div class="ws-info"><span id="wsFound">0 / ${wsTargets.length} found</span><button class="btn ghost sm" onclick="newWordSearch()">↻ New grid</button></div>
    <div class="ws-grid" id="wsGrid"></div><div class="ws-words" id="wsWords"></div>`;
  const g=document.getElementById('wsGrid'); g.style.gridTemplateColumns=`repeat(${wsSize},1fr)`;
  let html='';
  for(let r=0;r<wsSize;r++)for(let c=0;c<wsSize;c++){
    const id=r+'-'+c, found=wsTargets.some(t=>wsFoundSet.has(t.txt)&&t.cells&&t.cells.includes(id));
    html+=`<div class="ws-cell ${found?'found':''}" data-id="${id}">${wsGrid[r][c]}</div>`;
  }
  g.innerHTML=html; attachWs(); renderWsTargets();
}
function renderWsTargets(){
  const f=document.getElementById('wsFound'); if(f) f.textContent=`${wsFoundSet.size} / ${wsTargets.length} found`;
  const w=document.getElementById('wsWords'); if(w) w.innerHTML=wsTargets.map(t=>`<div class="ws-target ${wsFoundSet.has(t.txt)?'done':''}">${germanOf(t.w)}<div class="en">${t.w.en}</div></div>`).join('');
  if(wsFoundSet.size===wsTargets.length&&wsTargets.length) setTimeout(()=>toast('🔤 All found! Super!'),300);
}
function attachWs(){
  const g=document.getElementById('wsGrid');
  const cf=(x,y)=>{const e=document.elementFromPoint(x,y);return e&&e.classList.contains('ws-cell')?e:null;};
  const add=el=>{const id=el.dataset.id;if(wsSel.includes(id))return;wsSel.push(id);el.classList.add('sel');};
  const start=(x,y)=>{wsDragging=true;wsSel=[];const e=cf(x,y);if(e)add(e);};
  const move=(x,y)=>{if(!wsDragging)return;const e=cf(x,y);if(e)add(e);};
  const end=()=>{if(!wsDragging)return;wsDragging=false;checkWs();};
  g.ontouchstart=e=>{e.preventDefault();const t=e.touches[0];start(t.clientX,t.clientY);};
  g.ontouchmove=e=>{e.preventDefault();const t=e.touches[0];move(t.clientX,t.clientY);};
  g.ontouchend=e=>{e.preventDefault();end();};
  g.onmousedown=e=>{e.preventDefault();start(e.clientX,e.clientY);};
  g.onmousemove=e=>{if(wsDragging)move(e.clientX,e.clientY);};
  window.onmouseup=()=>end();
}
function checkWs(){
  const word=wsSel.map(id=>{const [r,c]=id.split('-').map(Number);return wsGrid[r][c];}).join('');
  const rev=word.split('').reverse().join('');
  const hit=wsTargets.find(t=>!wsFoundSet.has(t.txt)&&(t.txt===word||t.txt===rev));
  if(hit){ wsFoundSet.add(hit.txt); wsSel.forEach(id=>{const e=document.querySelector(`#wsGrid [data-id="${id}"]`);if(e){e.classList.remove('sel');e.classList.add('found');}}); renderWsTargets(); toast('✓ '+germanOf(hit.w)); }
  else document.querySelectorAll('#wsGrid .ws-cell.sel').forEach(c=>c.classList.remove('sel'));
  wsSel=[];
}

/* ----- MEMORY ----- */
let memCards=[], memFlip=[], memMoves=0, memLock=false;
function newMemoryGame(){
  memMoves=0; memFlip=[]; memLock=false;
  const pool=gamePool(8); const pick=shuffle(pool).slice(0,Math.min(8,pool.length));
  memCards=[];
  pick.forEach((w,i)=>{ memCards.push({pair:i,kind:'de',text:germanOf(w)}); memCards.push({pair:i,kind:'en',text:w.en}); });
  memCards=shuffle(memCards); renderMem();
}
function renderMem(){
  const el=document.getElementById('screen-games');
  el.innerHTML=`<div class="section-head"><div><h1 class="title">Memory Match</h1></div></div>${gameBackBtn()}
    <div class="ws-info"><span id="memMoves">${memMoves} moves</span><button class="btn ghost sm" onclick="newMemoryGame()">↻ Restart</button></div>
    <div class="mem-grid" id="memGrid">${memCards.map((c,i)=>`<div class="mem-card" id="mc-${i}" onclick="flipMem(${i})"><div class="mem-face mem-back">?</div><div class="mem-face mem-front ${c.kind}">${c.text}</div></div>`).join('')}</div>`;
}
function flipMem(i){
  if(memLock) return;
  const el=document.getElementById('mc-'+i);
  if(el.classList.contains('flipped')||el.classList.contains('matched')) return;
  el.classList.add('flipped'); memFlip.push(i);
  if(memFlip.length===2){
    memMoves++; document.getElementById('memMoves').textContent=memMoves+' moves'; memLock=true;
    const [a,b]=memFlip;
    if(memCards[a].pair===memCards[b].pair){
      setTimeout(()=>{document.getElementById('mc-'+a).classList.add('matched');document.getElementById('mc-'+b).classList.add('matched');memFlip=[];memLock=false;
        if(memCards.every((_,j)=>document.getElementById('mc-'+j).classList.contains('matched'))) toast('🧩 Solved in '+memMoves+' moves!');},420);
    } else setTimeout(()=>{document.getElementById('mc-'+a).classList.remove('flipped');document.getElementById('mc-'+b).classList.remove('flipped');memFlip=[];memLock=false;},800);
  }
}

/* ===== storage display helpers ===== */
function fmtBytes(n){
  if(n<1024) return n+' B';
  if(n<1024*1024) return (n/1024).toFixed(1)+' KB';
  return (n/1024/1024).toFixed(2)+' MB';
}
function storageBreakdown(){
  const s=DB.get();
  const learned=Object.values(s.progress).filter(p=>p.lastSeen!==null).length;
  const scheduled=Object.values(s.progress).filter(p=>!p.graduated&&p.due!==null).length;
  const dayCount=Object.keys(s.days).filter(k=>{const d=s.days[k];return d.new.length||d.reviewed.length;}).length;
  return `${learned} words in progress · ${scheduled} scheduled for review · ${dayCount} day${dayCount!==1?'s':''} of history.<br>The ${activeWords().length}-word dictionary is built into the app and doesn't count toward this.`;
}

/* ===== export / import ===== */
function exportData(){
  const data=DB.serialize();
  const d=new Date();
  const name=`wortschatz-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  const P=window.Capacitor && window.Capacitor.Plugins;
  if(P && P.Filesystem && P.Share){
    (async()=>{ try{ const res=await P.Filesystem.writeFile({path:name,data:data,directory:'CACHE',encoding:'utf8'}); await P.Share.share({title:'Wortschatz backup',text:'My German vocabulary progress',url:res.uri}); toast('⬆️ Backup ready to save'); }catch(e){ toast('Export failed'); } })();
    return;
  }
  try{ const blob=new Blob([data],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200); toast('⬆️ Backup exported'); }catch(e){ toast('Export failed'); }
}
function importPicked(ev){
  const file=ev.target.files&&ev.target.files[0];
  ev.target.value=''; // allow re-picking same file later
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    let obj=null;
    try{ obj=JSON.parse(reader.result); }catch(e){ toast('❌ Not a valid backup file'); return; }
    confirmImport(obj);
  };
  reader.onerror=()=>toast('❌ Could not read file');
  reader.readAsText(file);
}
function confirmImport(obj){
  // quick preview of what's in the backup
  let info='';
  try{
    const learned=Object.values(obj.progress||{}).filter(p=>p.lastSeen!==null).length;
    const days=Object.keys(obj.days||{}).length;
    info=`This backup has ${learned} words in progress and ${days} day${days!==1?'s':''} of history.`;
  }catch(e){ info=''; }
  showModal(`<h2>Restore from backup?</h2>
    <div class="lead">${info}<br><br>This will <b>replace</b> your current progress on this device with the backup. This can't be undone.</div>
    <button class="btn warn full" onclick="doImport()">Replace with this backup</button>
    <div style="height:10px"></div>
    <button class="btn ghost full" onclick="closeModal()">Cancel</button>`);
  pendingImport=obj;
}
let pendingImport=null;
async function doImport(){
  if(!pendingImport){ closeModal(); return; }
  try{
    await DB.importData(pendingImport);
    pendingImport=null;
    closeModal();
    calMonth=null; selDay=null;
    const b=document.getElementById('screen-browse'); if(b) b.dataset.init='';
    toast('✅ Progress restored');
    showScreen('home');
  }catch(e){ closeModal(); toast('❌ Invalid backup format'); }
}

/* =========================================================
   FEATURE 1 — BILDERQUIZ (picture-guessing game)
   Shows a big emoji; the user picks the matching German word.
   Pulls only from words present in EMOJI_MAP, drawn first from
   the day's studying pool, topped up from the level's picturable
   words so it's always playable.
   ========================================================= */
function emojiFor(w){ return EMOJI_MAP[ germanOf(w) ] || null; }

// picturable words from the current level (for distractors + top-up)
function picturableWords(){
  return activeWords().filter(emojiFor);
}
// the day's words (same source the mnemonics use): words introduced today,
// or — if none yet — the most recently introduced words. We deliberately do
// NOT pull random new words, so every section of the app stays on the same
// daily set for stronger memory.
function todaysWords(){
  const s=DB.get(), dk=todayKey();
  const day=s.days[dk]||{new:[],reviewed:[]};
  let ids=[...day.new];
  if(ids.length===0){
    ids=Object.keys(s.progress).filter(id=>s.progress[id].lastSeen!==null)
      .sort((a,b)=>(s.progress[b].lastSeen||0)-(s.progress[a].lastSeen||0)).slice(0,10);
  }
  return ids.map(id=>WORD_BY_ID[id]).filter(Boolean);
}
// today's words that can be pictured (a subset — abstract words are skipped,
// but no NEW words are ever introduced).
function picPool(){
  const seen=new Set();
  return todaysWords().filter(w=>emojiFor(w)).filter(w=>{const id=wid(w);if(seen.has(id))return false;seen.add(id);return true;});
}

let picQs=[], picIdx=0, picScore=0, picAnswered=false;
function buildPicture(){
  const pool=picPool();
  const el=document.getElementById('screen-games');
  if(pool.length<1){
    el.innerHTML=`<div class="section-head"><div><h1 class="title">Bilderquiz</h1></div></div>${gameBackBtn()}
      <div class="quiz-card" style="text-align:center">
        <div style="font-size:46px;margin-bottom:8px">🖼️</div>
        <div class="serif" style="font-size:20px;margin-bottom:6px">No picture words today (yet)</div>
        <div class="sub">None of today's words can be shown as a picture. Learn a few more concrete words — things like animals, food, or objects — and they'll appear here. Only today's words are used.</div>
      </div>`;
    return;
  }
  picIdx=0; picScore=0; picAnswered=false;
  const chosen=shuffle(pool).slice(0, Math.min(10,pool.length));
  picQs=chosen.map(w=>{
    // The pictured word (answer) is always from today's set. Distractors are
    // drawn first from today's other picturable words, then topped up from the
    // wider level pool so there are always up to 4 options to choose from.
    const used=new Set([wid(w)]); const usedEmoji=new Set([emojiFor(w)]); const usedG=new Set([germanOf(w)]);
    const others=[];
    const take=src=>{ for(const x of src){ if(used.has(wid(x))||usedEmoji.has(emojiFor(x))||usedG.has(germanOf(x))) continue; used.add(wid(x)); usedEmoji.add(emojiFor(x)); usedG.add(germanOf(x)); others.push(x); if(others.length>=3) break; } };
    take(shuffle(pool));                 // prefer today's words
    if(others.length<3) take(shuffle(picturableWords())); // then wider level
    const opts=shuffle([w,...others]).map(x=>({label:fullGerman(x), correct:wid(x)===wid(w)}));
    return {emoji:emojiFor(w), word:w, options:opts};
  });
  renderPicture();
}
function renderPicture(){
  const el=document.getElementById('screen-games');
  if(picIdx>=picQs.length){
    const pct=picQs.length?Math.round(picScore/picQs.length*100):0;
    el.innerHTML=`<div class="section-head"><div><h1 class="title">Bilderquiz</h1></div></div>${gameBackBtn()}
      <div class="quiz-card"><div class="quiz-score-big"><div class="num">${picScore}/${picQs.length}</div>
      <div style="color:var(--dim);margin-top:6px">${pct>=80?'Ausgezeichnet! 🌟':pct>=50?'Gut gemacht! 👍':'Weiter üben! 💪'}</div></div>
      <button class="btn full" onclick="buildPicture()">Play again</button></div>`;
    return;
  }
  const q=picQs[picIdx]; picAnswered=false;
  el.innerHTML=`<div class="section-head"><div><h1 class="title">Bilderquiz</h1></div></div>${gameBackBtn()}
    <div class="quiz-stat"><span>Picture ${picIdx+1}/${picQs.length}</span><span>Score ${picScore}</span></div>
    <div class="quiz-card">
      <div class="pic-emoji">${q.emoji}</div>
      <div class="quiz-qsub" id="picSub">Which word is this?</div>
      <div class="opts" id="picOpts">${q.options.map((o,i)=>`<button class="opt" onclick="answerPicture(${i})">${o.label}</button>`).join('')}</div>
    </div>`;
}
function answerPicture(i){
  if(picAnswered) return; picAnswered=true;
  const q=picQs[picIdx], btns=document.querySelectorAll('#picOpts .opt');
  btns.forEach((b,bi)=>{ if(q.options[bi].correct)b.classList.add('correct'); else if(bi===i)b.classList.add('wrong'); else b.classList.add('dim'); b.onclick=null; });
  if(q.options[i].correct){ picScore++; }
  speak(germanOf(q.word));
  // reveal the answer + English meaning so every card teaches, even with few options
  const sub=document.getElementById('picSub');
  if(sub) sub.innerHTML=`<b style="color:var(--txt)">${fullGerman(q.word)}</b> — ${q.word.en}`;
  setTimeout(()=>{ picIdx++; renderPicture(); }, 1450);
}

/* =========================================================
   FEATURE 2 — ESELSBRÜCKEN (silly mnemonic sentences)
   Builds one absurd-but-memorable German sentence per group
   of 5 words taken from the day's session (whatever words
   were actually studied that day, in groups of 5). Deterministic
   and offline. The target words are highlighted.
   ========================================================= */

// pools of silly connective scaffolding. The target words are presented in a
// "list" frame ("... und ... und ...") rather than forced into case-specific
// slots, so we never show confidently-wrong grammar to a learner — it stays
// silly without teaching broken German. English frames are kept index-aligned
// so the translation reads as a faithful mirror of the German.
const SILLY = {
  openers:[
    "Gestern träumte ich von diesen Dingen:",
    "Stell dir diese verrückte Szene vor:",
    "Im verrückten Zirkus sah ich:",
    "Mitten in der Nacht erschienen plötzlich:",
    "Auf dem Mond fand der Astronaut:",
    "Zum Frühstück wünschte sich Oma:",
    "Der Zauberer holte aus seinem Hut:",
    "In meinem Koffer waren auf einmal:"
  ],
  openers_en:[
    "Yesterday I dreamed of these things:",
    "Picture this crazy scene:",
    "At the crazy circus I saw:",
    "In the middle of the night, there suddenly appeared:",
    "On the moon the astronaut found:",
    "For breakfast Grandma wished for:",
    "The magician pulled out of his hat:",
    "In my suitcase there were suddenly:"
  ],
  endings:[
    "— und alle klatschten begeistert!",
    "— und niemand verstand, warum.",
    "— mitten im Supermarkt!",
    "— und dann verschwand alles wieder.",
    "— so ein verrückter Tag!",
    "— und ich wachte lachend auf.",
    "— völlig verrückt, oder?",
    "— bis die Sonne unterging."
  ],
  endings_en:[
    "— and everyone clapped with delight!",
    "— and nobody understood why.",
    "— right in the middle of the supermarket!",
    "— and then it all disappeared again.",
    "— what a crazy day!",
    "— and I woke up laughing.",
    "— totally crazy, right?",
    "— until the sun went down."
  ]
};
function pick(arr,seed){ return arr[Math.abs(seed)%arr.length]; }
// simple deterministic hash so the same words always give the same sentence
function hashIds(ids){ let h=0; const s=ids.join('|'); for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; } return h; }

// English label for a word, with article kept ("the ...") so the mirror reads
// naturally. Strips the German example, just the meaning.
function enLabel(w){ return w.en; }

// build both German (highlighted, tappable) and English versions of one silly
// framed list. Returns {de, en}. Works for any count >=1.
function sillySentence(words){
  const ids=words.map(wid); const h=hashIds(ids);
  const oi=Math.abs(h)%SILLY.openers.length;
  const ei=Math.abs(h>>8)%SILLY.endings.length;
  // German (tagged for audio + highlight)

function todaysWordGroups(){

function storiesForLevel(L){ return STORIES.filter(s=>s.level===L); }


/* ===== STORIES screen — daily rotation, list + reader + quiz ===== */
let curStory=null, storyShowEn=false, sqIdx=0, sqScore=0, sqAnswered=false, storyPlaying=false, storyQueue=[];

// Deterministic shuffle seeded by an integer (so a given cycle is stable per level)
function seededOrder(n, seed){
  const idx=[...Array(n).keys()];
  let s=seed>>>0;
  const rnd=()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; };
  for(let i=n-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  return idx;
}
// Hash a string to an int (for stable per-level seeds)
function strHash(str){ let h=2166136261>>>0; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

// Returns the ordered list of stories for a level for the current rotation,
// plus which index is "today". Cycle reshuffles every N stories.
function rotationFor(L){
  const list=storiesForLevel(L);
  const n=list.length;
  if(!n) return {list:[], order:[], todayPos:0, dayIndex:0};
  const startDay=storyEpoch();              // fixed reference day
  const elapsed=todayNum()-startDay;         // whole days since reference
  const dayIndex=((elapsed%n)+n)%n;          // position within the current cycle (0..n-1)
  const cycle=Math.floor((elapsed>=0?elapsed:elapsed-(n-1))/n); // which cycle we're in
  const order=seededOrder(n, strHash(L)+cycle*2654435761); // reshuffle each cycle
  return {list, order, todayPos:dayIndex, dayIndex};
}
// Fixed reference "day 0" for story rotation (a Jan 1 baseline keeps it stable)
function storyEpoch(){ return Math.floor(Date.UTC(2025,0,1)/86400000); }

function renderStories(){
  const el=document.getElementById('screen-stories');
  const s=DB.get();
  const lvl=s.currentLevel;
  const {list, order, todayPos}=rotationFor(lvl);
  if(!list.length){
    el.innerHTML=`
      <div class="section-head"><div><h1 class="title">Stories</h1><div class="sub">Read &amp; listen · Level ${lvl}</div></div></div>
      <div class="empty">No stories for ${lvl} yet.<br>More are on the way!</div>`;
    return;
  }
  // today's story
  const todayStory=list[order[todayPos]];
  const doneToday=s.storiesDone[todayStory.id];
  const todayCard=`
    <div class="set-label">Today's story</div>
    <div class="story-tile" style="border-color:rgba(90,209,168,.5);background:rgba(90,209,168,.06)" onclick="openStory('${todayStory.id}')">
      <div class="si" style="background:rgba(90,209,168,.18)">${todayStory.emoji}</div>
      <div style="flex:1;min-width:0">
        <div class="st">${todayStory.title}</div>
        <div class="sd">${todayStory.titleEn} — ${todayStory.blurb}</div>
        <div class="smeta">${todayStory.sentences.length} sentences · ${todayStory.quiz.length} questions ${doneToday!=null?`<span class="story-done">✓ best ${doneToday}%</span>`:''}</div>
      </div>
      <div style="font-size:22px;color:var(--accent)">›</div>
    </div>`;

  // past stories = those shown on earlier days of the current cycle (most recent first)
  let pastCards='';
  if(todayPos>0){
    const items=[];
    for(let p=todayPos-1;p>=0;p--){
      const st=list[order[p]];
      const done=s.storiesDone[st.id];
      const ago=todayPos-p; // days ago
      items.push(`
        <div class="story-tile" onclick="openStory('${st.id}')">
          <div class="si">${st.emoji}</div>
          <div style="flex:1;min-width:0">
            <div class="st">${st.title}</div>
            <div class="sd">${st.titleEn}</div>
            <div class="smeta">${ago} day${ago>1?'s':''} ago ${done!=null?`<span class="story-done">✓ best ${done}%</span>`:''}</div>
          </div>
          <div style="font-size:22px;color:var(--dim)">›</div>
        </div>`);
    }
    pastCards=`<div class="set-label">Earlier this cycle</div>`+items.join('');
  }

  const upcoming=list.length-1-todayPos;
  const footer=`<div class="sub" style="text-align:center;margin-top:10px;line-height:1.5">A new story unlocks every day. ${upcoming>0?`${upcoming} more to come this cycle.`:`This is the last story of the cycle — tomorrow a fresh, reshuffled cycle begins!`}</div>`;

  el.innerHTML=`
    <div class="section-head"><div><h1 class="title">Stories</h1><div class="sub">A new story each day · Level ${lvl}</div></div></div>
    <div class="banner acc">📕 Read along, tap any sentence to hear it, then take a short quiz.</div>
    ${todayCard}
    ${pastCards}
    ${footer}
    <div style="height:20px"></div>`;
}

function openStory(id){
  curStory=STORIES.find(x=>x.id===id);
  if(!curStory) return;
  storyShowEn=false;
  stopStoryAudio();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-stories').classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.s==='stories'));
  renderStoryReader();
  document.getElementById('app').scrollTop=0;
}

function renderStoryReader(){
  const el=document.getElementById('screen-stories');
  const st=curStory;
  const sents=st.sentences.map((sn,i)=>`
    <div class="sent ${storyShowEn?'show-en':''}" id="sent-${i}" onclick="toggleSentEn(${i})">
      <div class="sent-de">
        <button class="sent-mini" onclick="playSentence(${i},event)" aria-label="Hear">🔊</button>
        <span class="stxt">${sn.de}</span>
      </div>
      <div class="sent-en">${sn.en}</div>
    </div>`).join('');
  el.innerHTML=`
    <button class="game-back" onclick="closeStory()">‹ All stories</button>
    <div class="section-head"><div><h1 class="title">${st.emoji} ${st.title}</h1><div class="sub">${st.titleEn}</div></div></div>
    <div class="story-toolbar">
      <button class="btn sm" onclick="playWholeStory()" id="playAllBtn">▶️ Play all</button>
      <button class="btn ghost sm" onclick="stopStoryAudio()">⏹ Stop</button>
      <button class="btn ghost sm" onclick="toggleAllEn()" id="enBtn">${storyShowEn?'Hide':'Show'} English</button>
    </div>
    ${sents}
    <div style="height:14px"></div>
    <button class="btn full" onclick="startStoryQuiz()">📝 Take the quiz (${st.quiz.length} questions)</button>
    <div style="height:24px"></div>`;
}

function toggleSentEn(i){
  const elx=document.getElementById('sent-'+i);
  if(elx) elx.classList.toggle('show-en');
}
function toggleAllEn(){
  storyShowEn=!storyShowEn;
  document.querySelectorAll('#screen-stories .sent').forEach(s=>s.classList.toggle('show-en',storyShowEn));
  const b=document.getElementById('enBtn'); if(b) b.textContent=(storyShowEn?'Hide':'Show')+' English';
}
function highlightSent(i){
  document.querySelectorAll('#screen-stories .sent').forEach(s=>s.classList.remove('playing'));
  if(i>=0){ const elx=document.getElementById('sent-'+i); if(elx){ elx.classList.add('playing'); elx.scrollIntoView({block:'center',behavior:'smooth'}); } }
}
function playSentence(i,ev){
  if(ev) ev.stopPropagation();
  stopStoryAudio();
  const tts=nativeTTS();
  if(tts){
    highlightSent(i);
    storyPlaying=true;
    tts.speak({text:curStory.sentences[i].de, lang:'de-DE', rate:.85, pitch:1.0, volume:1.0, category:'ambient'})
      .catch(()=>toast('🔇 Audio unavailable'))
      .finally(()=>{ storyPlaying=false; highlightSent(-1); });
    return;
  }
  if(!window.speechSynthesis){ toast('🔇 Audio not supported here'); return; }
  highlightSent(i);
  const u=new SpeechSynthesisUtterance(curStory.sentences[i].de);
  u.lang='de-DE'; u.rate=.85; if(deVoice) u.voice=deVoice;
  u.onend=()=>highlightSent(-1);
  try{ speechSynthesis.speak(u); }catch(e){ toast('🔇 Audio unavailable'); }
}
function playWholeStory(){
  stopStoryAudio();
  storyPlaying=true;
  let i=0;
  const tts=nativeTTS();
  if(tts){
    const playNextNative=()=>{
      if(!storyPlaying || i>=curStory.sentences.length){ storyPlaying=false; highlightSent(-1); return; }
      highlightSent(i);
      tts.speak({text:curStory.sentences[i].de, lang:'de-DE', rate:.85, pitch:1.0, volume:1.0, category:'ambient'})
        .then(()=>{ if(!storyPlaying) return; i++; playNextNative(); })
        .catch(()=>{ storyPlaying=false; toast('🔇 Audio unavailable'); });
    };
    playNextNative();
    return;
  }
  if(!window.speechSynthesis){ toast('🔇 Audio not supported here'); return; }
  const playNext=()=>{
    if(!storyPlaying || i>=curStory.sentences.length){ storyPlaying=false; highlightSent(-1); return; }
    highlightSent(i);
    const u=new SpeechSynthesisUtterance(curStory.sentences[i].de);
    u.lang='de-DE'; u.rate=.85; if(deVoice) u.voice=deVoice;
    u.onend=()=>{ i++; playNext(); };
    try{ speechSynthesis.speak(u); }catch(e){ storyPlaying=false; toast('🔇 Audio unavailable'); }
  };
  playNext();
}
function stopStoryAudio(){
  storyPlaying=false;
  const tts=nativeTTS();
  if(tts){ try{ tts.stop(); }catch(e){} }
  if(window.speechSynthesis){ try{ speechSynthesis.cancel(); }catch(e){} }
  highlightSent(-1);
}
function closeStory(){
  stopStoryAudio();
  curStory=null;
  renderStories();
}

/* ----- STORY QUIZ ----- */
function startStoryQuiz(){
  stopStoryAudio();
  sqIdx=0; sqScore=0; sqAnswered=false;
  renderStoryQuiz();
}
function renderStoryQuiz(){
  const el=document.getElementById('screen-stories');
  const st=curStory, qs=st.quiz;
  if(sqIdx>=qs.length){
    const pct=qs.length?Math.round(sqScore/qs.length*100):0;
    const s=DB.get();
    const prev=s.storiesDone[st.id];
    if(prev==null || pct>prev){ s.storiesDone[st.id]=pct; DB.save(); }
    el.innerHTML=`<button class="game-back" onclick="closeStory()">‹ All stories</button>
      <div class="section-head"><div><h1 class="title">${st.emoji} ${st.title}</h1><div class="sub">Quiz result</div></div></div>
      <div class="quiz-card"><div class="quiz-score-big"><div class="num">${sqScore}/${qs.length}</div>
        <div style="color:var(--dim);margin-top:6px">${pct>=80?'Ausgezeichnet! 🌟':pct>=50?'Gut gemacht! 👍':'Lies die Geschichte noch einmal! 📖'}</div></div>
        <button class="btn full" onclick="startStoryQuiz()">Try the quiz again</button>
        <div style="height:10px"></div>
        <button class="btn ghost full" onclick="renderStoryReader()">📖 Re-read the story</button>
      </div><div style="height:20px"></div>`;
    return;
  }
  const q=qs[sqIdx]; sqAnswered=false;
  el.innerHTML=`<button class="game-back" onclick="renderStoryReader()">‹ Back to story</button>
    <div class="quiz-stat"><span>Question ${sqIdx+1}/${qs.length}</span><span>Score ${sqScore}</span></div>
    <div class="quiz-card"><div class="quiz-qsub">${st.title}</div><div class="quiz-q">${q.q}</div>
      <div class="opts" id="sqOpts">${q.options.map((o,i)=>`<button class="opt" onclick="answerStoryQuiz(${i})">${o}</button>`).join('')}</div></div>`;
}
function answerStoryQuiz(i){
  if(sqAnswered) return; sqAnswered=true;
  const q=curStory.quiz[sqIdx], btns=document.querySelectorAll('#sqOpts .opt');
  btns.forEach((b,bi)=>{ if(bi===q.answer)b.classList.add('correct'); else if(bi===i)b.classList.add('wrong'); else b.classList.add('dim'); b.onclick=null; });
  if(i===q.answer) sqScore++;
  setTimeout(()=>{ sqIdx++; renderStoryQuiz(); }, 1050);
}

</script>
